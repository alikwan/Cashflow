# nginx config for the cashflow-web frontend container.
#
# Serves the static React/Vite SPA AND reverse-proxies /api/* to the backend
# container on the internal Docker network. This is the same-origin production
# model: the browser talks to ONE origin (this nginx host:port), so the
# backend's HttpOnly `session` cookie (SameSite=Lax, same-origin) works with NO
# CORS. Cookies pass through transparently — we do NOT touch Set-Cookie.

# gzip text assets (JS/CSS/JSON/SVG). Hashed bundles are already small over the
# LAN, but this trims the first paint a little.
gzip on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;

server {
    listen 80;
    server_name _;

    # ── API reverse proxy ────────────────────────────────────────────────────
    # proxy_pass WITHOUT a trailing path/URI, so the FULL request URI (including
    # the /api prefix) is forwarded verbatim. The backend routes live under
    # /api/..., so the prefix MUST be preserved.
    #   GET /api/health  →  http://backend:8000/api/health
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Set-Cookie / Cookie headers pass through untouched (default) so the
        # same-origin session cookie round-trips correctly.
    }

    # ── Static SPA ───────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed Vite assets (filenames change on every build).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html (never cache it, so a new
    # deploy is picked up immediately). This app uses state-based nav, but the
    # fallback keeps deep links / refreshes correct.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
