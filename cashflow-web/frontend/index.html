<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="utf-8" />
    <title>البيت السعيد · تحليل السيولة النقدية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Fonts: Cairo (body) + Tajawal (headings). The same set is also
         @import-ed by colors_and_type.css; this <link> is belt-and-suspenders
         for the real browser and lets it preconnect early. Weights match the
         design system: Cairo 300;400;500;600;700 — Tajawal 300;400;500;700. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap"
    />

    <style>
      body { margin: 0; background: var(--color-bg); }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
      ::-webkit-scrollbar-thumb:hover { background: var(--slate-400); background-clip: content-box; }
      table { font-variant-numeric: lining-nums tabular-nums; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
