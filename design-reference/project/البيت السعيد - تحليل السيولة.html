<!doctype html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8" />
<title>البيت السعيد · تحليل السيولة النقدية</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="src/colors_and_type.css" />
<style>
  body { margin: 0; background: var(--color-bg); }
  .app { display: flex; align-items: flex-start; min-height: 100vh; }
  .main { flex: 1; min-width: 0; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--slate-400); background-clip: content-box; }
  table { font-variant-numeric: lining-nums tabular-nums; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- نموذج البيانات (سكربت عادي يُحمَّل قبل المكوّنات) -->
<script src="src/data.js"></script>

<!-- المكوّنات (JSX عبر Babel) -->
<script type="text/babel" src="src/tweaks-panel.jsx"></script>
<script type="text/babel" src="src/Primitives.jsx"></script>
<script type="text/babel" src="src/Charts.jsx"></script>
<script type="text/babel" src="src/Shell.jsx"></script>
<script type="text/babel" src="src/Dashboard.jsx"></script>
<script type="text/babel" src="src/MonthlyFlow.jsx"></script>
<script type="text/babel" src="src/Breakdown.jsx"></script>
<script type="text/babel" src="src/Suppliers.jsx"></script>
<script type="text/babel" src="src/Installments.jsx"></script>
<script type="text/babel" src="src/Forecast.jsx"></script>
<script type="text/babel" src="src/SupplierPlan.jsx"></script>
<script type="text/babel" src="src/Settings.jsx"></script>

<script type="text/babel">
/* global React, ReactDOM, Sidebar, Header, Dashboard, MonthlyFlow, Breakdown, Suppliers, Installments, Forecast, SupplierPlan, Settings, ToastHost,
   useTweaks, TweaksPanel, TweakSection, TweakSlider, TweakToggle, TweakRadio */
const { useState, useEffect, useCallback } = React;

const ACCENTS = {
  'أزرق':  { p50:'#EFF6FF', p100:'#DBEAFE', p500:'#3B82F6', p600:'#2563EB', p700:'#1D4ED8' },
  'كحلي':  { p50:'#EEF2FF', p100:'#E0E7FF', p500:'#6366F1', p600:'#4F46E5', p700:'#4338CA' },
  'أخضر':  { p50:'#F0FDFA', p100:'#CCFBF1', p500:'#14B8A6', p600:'#0D9488', p700:'#0F766E' },
};

const ROUTE_KEY = 'cashflow_route';
const SETTINGS_KEY = 'cashflow_settings_v1';

function defaultSettings() {
  const caps = {};
  (window.DATA.SUPPLIERS || []).forEach(s => { caps[s.id] = s.cap; });
  return {
    accent: 'أزرق', showAlert: true,
    exchangeRate: window.DATA.USD_RATE, fyStart: 5,
    reserve: window.DATA.RESERVE_M, incomeGrowth: 0,
    negThreshold: 0, overCapWarn: true,
    caps,
  };
}
function loadSettings() {
  const def = defaultSettings();
  try {
    const raw = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    return { ...def, ...raw, caps: { ...def.caps, ...(raw.caps || {}) } };
  } catch { return def; }
}

function App() {
  const [settings, setSettings] = useState(loadSettings);
  const [page, setPage] = useState(() => {
    try { return localStorage.getItem(ROUTE_KEY) || 'dashboard'; } catch { return 'dashboard'; }
  });
  useEffect(() => { try { localStorage.setItem(ROUTE_KEY, page); } catch {} }, [page]);
  useEffect(() => { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch {} }, [settings]);

  // تطبيق لون التمييز على الجذر
  useEffect(() => {
    const a = ACCENTS[settings.accent] || ACCENTS['أزرق'];
    const r = document.documentElement.style;
    r.setProperty('--color-primary', a.p600); r.setProperty('--color-primary-hover', a.p700);
    r.setProperty('--primary-50', a.p50); r.setProperty('--primary-100', a.p100);
    r.setProperty('--primary-500', a.p500); r.setProperty('--primary-600', a.p600);
    r.setProperty('--primary-700', a.p700); r.setProperty('--chart-1', a.p600);
  }, [settings.accent]);

  const setSetting = useCallback((k, v) => setSettings(s => ({ ...s, [k]: v })), []);
  const resetSettings = useCallback(() => { const def = defaultSettings(); setSettings(def); return def; }, []);
  const go = (id) => { setPage(id); window.scrollTo({ top: 0 }); };

  return (
    <React.Fragment>
      <div className="app">
        <Sidebar active={page} onNavigate={go} />
        <div className="main">
          <Header page={page} onNavigate={go} exchangeRate={settings.exchangeRate} />
          {page === 'dashboard'    && <Dashboard onNavigate={go} showAlert={settings.showAlert} negThreshold={settings.negThreshold} />}
          {page === 'monthly'      && <MonthlyFlow negThreshold={settings.negThreshold} />}
          {page === 'breakdown'    && <Breakdown exchangeRate={settings.exchangeRate} />}
          {page === 'suppliers'    && <Suppliers caps={settings.caps} overCapWarn={settings.overCapWarn} exchangeRate={settings.exchangeRate} />}
          {page === 'installments' && <Installments />}
          {page === 'forecast'     && <Forecast reserve={settings.reserve} incomeGrowth={settings.incomeGrowth} />}
          {page === 'supplierplan' && <SupplierPlan reserve={settings.reserve} incomeGrowth={settings.incomeGrowth} caps={settings.caps} />}
          {page === 'settings'     && <Settings settings={settings} onChange={setSettings} onReset={resetSettings} />}
        </div>
      </div>

      <ToastHost />

      <TweaksPanel title="تعديل سريع">
        <TweakSection label="المظهر" />
        <TweakRadio label="لون التمييز" value={settings.accent} options={['أزرق', 'كحلي', 'أخضر']} onChange={(v) => setSetting('accent', v)} />
        <TweakToggle label="إظهار شريط الإنذار" value={settings.showAlert} onChange={(v) => setSetting('showAlert', v)} />
        <TweakSection label="افتراضات التنبؤ" />
        <TweakSlider label="احتياطي المفاجآت" value={settings.reserve} min={0} max={40} step={1} unit=" م" onChange={(v) => setSetting('reserve', v)} />
        <TweakSlider label="نمو المقبوضات المتوقع" value={settings.incomeGrowth} min={-15} max={15} step={1} unit="٪" onChange={(v) => setSetting('incomeGrowth', v)} />
        <div style={{ fontSize: 11, color: 'var(--slate-400)', marginTop: 8, lineHeight: 1.5 }}>للمزيد من الخيارات افتح صفحة الإعدادات.</div>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
